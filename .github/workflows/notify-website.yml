name: Notify ward9.online of bylaw changes

# Triggers a rebuild of mmward9/ward9.online when the rendered
# bylaw output changes (i.e., after the render workflow has
# committed an update to rendered/BYLAW.md).
#
# Requires a repo secret named WARD9_REPO_PAT with a fine-grained
# PAT that has 'Contents: Read and write' on mmward9/ward9.online.
# Without that secret, this workflow exits 0 with a log message —
# the website's daily scheduled rebuild will still pick up changes
# within 24 hours.

on:
  push:
    branches: [main]
    paths:
      - 'rendered/BYLAW.md'
      - 'rendered/examples/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger website rebuild via repository_dispatch
        env:
          WARD9_REPO_PAT: ${{ secrets.WARD9_REPO_PAT }}
          SOURCE_COMMIT: ${{ github.sha }}
          SOURCE_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          set -euo pipefail
          if [ -z "${WARD9_REPO_PAT:-}" ]; then
            echo "WARD9_REPO_PAT secret not configured; skipping dispatch."
            echo "Daily scheduled rebuild on ward9.online will still propagate changes within 24h."
            exit 0
          fi
          # Build payload with jq to avoid shell-escaping issues with commit message
          payload=$(jq -nc --arg c "$SOURCE_COMMIT" --arg m "$SOURCE_MESSAGE" \
            '{event_type:"bylaw-updated", client_payload:{source_commit:$c, source_message:$m}}')
          response=$(curl -sS -o /tmp/resp.json -w "%{http_code}" -X POST \
            -H "Authorization: Bearer ${WARD9_REPO_PAT}" \
            -H "Accept: application/vnd.github+json" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/mmward9/ward9.online/dispatches" \
            -d "$payload")
          echo "HTTP $response"
          cat /tmp/resp.json || true
          if [ "$response" != "204" ]; then
            echo "ERROR: dispatch failed with HTTP $response"
            exit 1
          fi
          echo "Successfully triggered ward9.online rebuild"
