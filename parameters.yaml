# Effective date note for the renderer. The operative bylaw text already
# specifies effective date (enacting clause 3) and first-applicable-year
# behaviour (s. 4.5(f)).
bylaw_effective_date_note: |
  Effective the day of passage. First annual adjustment under the levy-linked
  clause applies on the first January 1 occurring after the by-law comes
  into force, using the total municipal tax levy (the general local
  municipality levy decided in the City's budget, Municipal Act s. 312(1))
  net of the Treasurer-published assessment growth amount, compared to the
  total municipal tax levy for the immediately preceding fiscal year.
