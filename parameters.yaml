# Effective date note for the renderer. The operative bylaw text already
# specifies effective date and first-applicable-year behaviour in clause 1(d).
bylaw_effective_date_note: |
  Effective the day of passage. First annual adjustment under the levy-linked
  clause applies on the first January 1 occurring after the by-law comes
  into force, using the total municipal tax levy from the annual rating
  by-law for the fiscal year that began before that January 1, compared
  to the total municipal tax levy for the immediately preceding fiscal year.
