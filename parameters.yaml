# PACT Bylaw — parameters.
#
# Under the v12 amending-by-law approach, the PACT Bylaw adds a single new
# section 4.3 to existing City of London By-law CPOL.-70(b)-220
# (Remuneration for Elected Officials and Appointed Citizen Members Policy).
# The operative compensation parameters — base pay, annual indexing formula,
# zero floor, wage-freeze pause, recurring base reset — are ALL set by the
# existing City instruments and are NOT re-invented here. PACT only adds
# the levy linkage.
#
# This file therefore contains only metadata and verified primary-source
# references used in the operative bylaw text and renderer. Almost all
# substantive proposed changes to the PACT Bylaw should be a pull request
# to bylaw/01-amending-bylaw.md, not to this file.

metadata:
  status: "draft, public consultation"
  version: "1.0-draft"
  last_substantive_review: "2026-05-22"
  campaign_brand: "Pay Accountable to City Taxpayers (PACT) Bylaw"

